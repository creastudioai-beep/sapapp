name: Build & Deploy Site

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_fetch:
        description: 'Run full Telegram archive fetch (not incremental)'
        required: false
        default: 'false'
        type: boolean
      purge_cache:
        description: 'Purge Cloudflare cache after deploy'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: build-deploy-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  build:
    name: Generate Static Site
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      build_status: ${{ steps.build_result.outputs.status }}
      posts_count: ${{ steps.build_summary.outputs.posts_count }}
      build_duration: ${{ steps.build_summary.outputs.build_duration }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore pipeline data cache
        uses: actions/cache@v4
        with:
          path: data
          key: pipeline-data-${{ github.run_id }}
          restore-keys: |
            pipeline-data-

      - name: Run site generator
        id: generator
        timeout-minutes: 90
        run: |
          echo "::group::Site Generator"
          START_TIME=$(date +%s)

          # Try with Telegram fetch first, fall back to without
          if [ "${{ github.event.inputs.full_fetch }}" == "true" ]; then
            echo "Full archive fetch requested"
            python -m site_generator --full-archive 2>&1 | tee build.log || {
              echo "::warning::Full archive fetch failed, retrying without Telegram fetch"
              rm -rf output
              python -m site_generator 2>&1 | tee build-retry.log || {
                echo "::error::Site generator failed"
                exit 1
              }
            }
          else
            echo "Incremental build (with optional Telegram update)"
            python -m site_generator --fetch-archive 2>&1 | tee build.log || {
              echo "::warning::Build with Telegram fetch failed, retrying without"
              rm -rf output
              python -m site_generator 2>&1 | tee build-retry.log || {
                echo "::error::Site generator failed"
                exit 1
              }
            }
          fi

          END_TIME=$(date +%s)
          DURATION=$(( END_TIME - START_TIME ))
          echo "::endgroup::"

          echo "build_duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "Build completed in ${DURATION}s"

      - name: Validate output
        run: |
          if [ ! -d "output" ]; then
            echo "::error::output/ directory not found — build failed"
            exit 1
          fi

          HTML_COUNT=$(find output -name '*.html' | wc -l)
          echo "html_files_count=${HTML_COUNT}" >> $GITHUB_OUTPUT

          if [ "$HTML_COUNT" -eq 0 ]; then
            echo "::error::No HTML files generated in output/"
            exit 1
          fi

          echo "Output validation: ${HTML_COUNT} HTML file(s) found"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Set build result
        id: build_result
        run: echo "status=success" >> $GITHUB_OUTPUT

      - name: Build summary
        id: build_summary
        run: |
          HTML_COUNT=$(find output -name '*.html' | wc -l)
          TOTAL_SIZE=$(du -sh output/ | cut -f1)

          echo "posts_count=${HTML_COUNT}" >> $GITHUB_OUTPUT
          echo "build_duration=${DURATION:-N/A}" >> $GITHUB_OUTPUT

          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Success |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Pages | ${HTML_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Output Size | ${TOTAL_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: ${{ needs.build.outputs.build_status == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deploy summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pages | ${{ needs.build.outputs.posts_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ needs.build.outputs.build_duration }} |" >> $GITHUB_STEP_SUMMARY

  purge-cache:
    name: Purge Cloudflare Cache
    needs: deploy
    if: ${{ github.event.inputs.purge_cache == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare secrets not configured — skipping cache purge"
            exit 0
          fi

          echo "Purging Cloudflare cache..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Cloudflare cache purged successfully"
          else
            echo "Cloudflare cache purge returned HTTP ${HTTP_STATUS}"
          fi

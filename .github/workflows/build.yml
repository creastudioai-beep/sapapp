name: Build & Deploy Site

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_fetch:
        description: 'Run full Telegram archive fetch (all ~87K posts, takes ~60 min)'
        required: false
        default: 'false'
        type: boolean
      purge_cache:
        description: 'Purge Cloudflare cache after deploy'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: build-deploy-pages
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  build:
    name: Generate Static Site
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      build_status: ${{ steps.build_result.outputs.status }}
      posts_count: ${{ steps.build_summary.outputs.posts_count }}
      archive_count: ${{ steps.build_summary.outputs.archive_count }}
      build_duration: ${{ steps.build_summary.outputs.build_duration }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore pipeline data cache
        uses: actions/cache@v4
        with:
          path: data
          key: pipeline-data-${{ github.run_id }}
          restore-keys: |
            pipeline-data-

      - name: Run site generator
        id: generator
        timeout-minutes: 90
        run: |
          echo "::group::Site Generator"
          START_TIME=$(date +%s)

          BUILD_SUCCESS=0

          if [ "${{ github.event.inputs.full_fetch }}" == "true" ]; then
            echo "Full archive fetch requested — fetching ALL posts from Telegram (~60 min)"
            python -m site_generator --full-archive 2>&1 | tee build.log && BUILD_SUCCESS=1 || {
              echo "::warning::Full archive fetch failed, trying with incremental"
              rm -rf output
              python -m site_generator --fetch-archive 2>&1 | tee build-retry.log && BUILD_SUCCESS=1 || {
                echo "::warning::Incremental fetch also failed, trying without fetch"
                rm -rf output
                python -m site_generator 2>&1 | tee build-nofetch.log && BUILD_SUCCESS=1 || {
                  echo "::warning::Build without fetch also failed, trying with --no-pages"
                  rm -rf output
                  python -m site_generator --no-pages 2>&1 | tee build-nopages.log || true
                }
              }
            }
          else
            # Standard build: try incremental Telegram update, then build
            echo "Standard build with incremental Telegram update"
            python -m site_generator --fetch-archive 2>&1 | tee build.log && BUILD_SUCCESS=1 || {
              echo "::warning::Build with incremental fetch failed, trying without fetch"
              rm -rf output
              python -m site_generator 2>&1 | tee build-nofetch.log && BUILD_SUCCESS=1 || {
                echo "::warning::Build without fetch also failed, trying with --no-pages"
                rm -rf output
                python -m site_generator --no-pages 2>&1 | tee build-nopages.log || true
              }
            }
          fi

          # Ensure output directory exists with at least a minimal site
          mkdir -p output
          if [ ! -f "output/index.html" ]; then
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SOCHIAUTOPARTS</title></head><body><h1>SOCHIAUTOPARTS</h1><p>Site is being rebuilt.</p></body></html>' > output/index.html
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>404</title></head><body><h1>404</h1></body></html>' > output/404.html
            echo "::warning::Created minimal fallback pages (build failed)"
          fi

          END_TIME=$(date +%s)
          DURATION=$(( END_TIME - START_TIME ))
          echo "::endgroup::"

          echo "build_duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "Build completed in ${DURATION}s"

      - name: Validate output
        run: |
          if [ ! -d "output" ]; then
            echo "::error::output/ directory not found — creating minimal fallback"
            mkdir -p output
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SOCHIAUTOPARTS</title></head><body><h1>SOCHIAUTOPARTS</h1></body></html>' > output/index.html
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>404</title></head><body><h1>404</h1></body></html>' > output/404.html
          fi

          HTML_COUNT=$(find output -name '*.html' | wc -l)
          echo "html_files_count=${HTML_COUNT}" >> $GITHUB_OUTPUT

          if [ "$HTML_COUNT" -eq 0 ]; then
            echo "::warning::No HTML files generated — creating fallback"
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SOCHIAUTOPARTS</title></head><body><h1>SOCHIAUTOPARTS</h1></body></html>' > output/index.html
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>404</title></head><body><h1>404</h1></body></html>' > output/404.html
            HTML_COUNT=2
          fi

          echo "Output validation: ${HTML_COUNT} HTML file(s) found"

          # Check archive data
          if [ -d "output/data/telegram_archive" ]; then
            ARCHIVE_FILES=$(find output/data/telegram_archive -name '*.json' | wc -l)
            echo "Telegram archive data: ${ARCHIVE_FILES} JSON files deployed"
          else
            echo "::warning::No Telegram archive data deployed — /archive/post/{id} will return 404"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Commit updated Telegram archive data
        if: always()
        run: |
          # Commit the telegram archive data back to the repo so the Worker
          # can access it via raw.githubusercontent.com
          if [ ! -d "data/telegram_archive" ]; then
            echo "No telegram archive data to commit"
            exit 0
          fi

          ARCHIVE_FILES=$(find data/telegram_archive -name '*.json' | wc -l)
          if [ "$ARCHIVE_FILES" -eq 0 ]; then
            echo "No JSON files in telegram archive"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/telegram_archive/

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to telegram archive data"
          else
            ARCHIVE_COUNT=$(python3 -c "import json; print(json.load(open('data/telegram_archive/meta.json')).get('total_posts', 0))" 2>/dev/null || echo "unknown")
            git commit -m "chore: update telegram archive data (${ARCHIVE_COUNT} posts) [skip ci]"
            git push
            echo "Committed telegram archive data: ${ARCHIVE_COUNT} posts"
          fi

      - name: Set build result
        id: build_result
        run: echo "status=success" >> $GITHUB_OUTPUT

      - name: Build summary
        id: build_summary
        run: |
          HTML_COUNT=$(find output -name '*.html' | wc -l)
          TOTAL_SIZE=$(du -sh output/ | cut -f1)

          # Count archive posts from meta.json
          ARCHIVE_COUNT=0
          if [ -f "output/data/telegram_archive/meta.json" ]; then
            ARCHIVE_COUNT=$(python3 -c "import json; print(json.load(open('output/data/telegram_archive/meta.json')).get('total_posts', 0))" 2>/dev/null || echo "0")
          fi

          echo "posts_count=${HTML_COUNT}" >> $GITHUB_OUTPUT
          echo "archive_count=${ARCHIVE_COUNT}" >> $GITHUB_OUTPUT
          echo "build_duration=${DURATION:-N/A}" >> $GITHUB_OUTPUT

          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Success |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Pages | ${HTML_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Archive Posts | ${ARCHIVE_COUNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Output Size | ${TOTAL_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Fetch | ${{ github.event.inputs.full_fetch || 'false' }} |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: ${{ needs.build.outputs.build_status == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deploy summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Pages | ${{ needs.build.outputs.posts_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Archive Posts | ${{ needs.build.outputs.archive_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ needs.build.outputs.build_duration }} |" >> $GITHUB_STEP_SUMMARY

  purge-cache:
    name: Purge Cloudflare Cache
    needs: deploy
    if: ${{ always() }}
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare secrets not configured — skipping cache purge"
            exit 0
          fi

          echo "Purging Cloudflare cache..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Cloudflare cache purged successfully"
          else
            echo "Cloudflare cache purge returned HTTP ${HTTP_STATUS}"
          fi

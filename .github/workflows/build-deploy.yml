name: Build & Deploy Static Site

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '_site/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode: full or recent'
        required: false
        default: 'recent'
        type: choice
        options:
          - full
          - recent
  schedule:
    # Full rebuild daily at 03:00 UTC (06:00 MSK)
    - cron: '0 3 * * *'
    # Hourly rebuild at minute 15 — downloads latest cached_posts.json and rebuilds
    - cron: '15 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_mode: ${{ env.BUILD_MODE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine build mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            CRON_EXPR="${{ github.event.schedule }}"
            if [[ "$CRON_EXPR" == "0 3 * * *" ]]; then
              echo "mode=full" >> $GITHUB_OUTPUT
              echo "BUILD_MODE=full" >> $GITHUB_ENV
              echo "=== Daily full rebuild ==="
            else
              echo "mode=recent" >> $GITHUB_OUTPUT
              echo "BUILD_MODE=recent" >> $GITHUB_ENV
              echo "=== Hourly rebuild (fresh posts) ==="
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "BUILD_MODE=${{ inputs.mode }}" >> $GITHUB_ENV
            echo "=== Manual dispatch: ${{ inputs.mode }} build ==="
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "mode=recent" >> $GITHUB_OUTPUT
            echo "BUILD_MODE=recent" >> $GITHUB_ENV
            echo "=== Push-triggered recent build ==="
          else
            echo "mode=recent" >> $GITHUB_OUTPUT
            echo "BUILD_MODE=recent" >> $GITHUB_ENV
            echo "=== Default recent build ==="
          fi

      - name: Download cached posts
        run: |
          echo "=== Downloading latest cached_posts.json ==="
          mkdir -p data
          curl -sL "https://raw.githubusercontent.com/creastudioai-beep/sap/refs/heads/main/data/cached_posts.json" \
            -o data/cached_posts.json
          POST_COUNT=$(python3 -c "import json; data=json.load(open('data/cached_posts.json')); print(len(data))" 2>/dev/null || echo "0")
          echo "Downloaded cached_posts.json with ${POST_COUNT} posts"
          if [ "$POST_COUNT" -eq "0" ]; then
            echo "ERROR: Failed to download cached_posts.json or it's empty!"
            exit 1
          fi

      - name: Clean old build output
        run: |
          echo "=== Cleaning output directory ==="
          rm -rf _site/
          echo "Output cleaned"

      - name: Build static site
        run: python -m site_generator --output _site
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify build output
        run: |
          echo "=== Build Output Summary ==="
          echo "Build mode: $BUILD_MODE"
          echo ""
          echo "Total size of _site/:"
          du -sh _site/ 2>/dev/null || echo "_site/ not found"
          echo ""
          echo "File counts:"
          find _site/ -name "*.html" 2>/dev/null | wc -l | xargs -I{} echo "  HTML files: {}"
          find _site/ -name "*.css" 2>/dev/null | wc -l | xargs -I{} echo "  CSS files: {}"
          find _site/ -name "*.js" 2>/dev/null | wc -l | xargs -I{} echo "  JS files: {}"
          find _site/ -name "*.xml" 2>/dev/null | wc -l | xargs -I{} echo "  XML files: {}"
          find _site/ -name "*.json" 2>/dev/null | wc -l | xargs -I{} echo "  JSON files: {}"
          echo ""
          echo "Key files:"
          ls -la _site/index.html _site/style.css _site/i18n.js _site/scripts.js 2>/dev/null || true
          echo ""
          echo "Shop pages count:"
          find _site/shop/ -name "index.html" 2>/dev/null | wc -l | xargs -I{} echo "  {} shop pages"
          echo ""
          echo "Post pages count:"
          find _site/post/ -name "*.html" 2>/dev/null | wc -l | xargs -I{} echo "  {} post pages"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Check site size
        run: |
          SIZE_BYTES=$(du -sb _site/ | cut -f1)
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Total _site/ size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 950 ]; then
            echo "WARNING: Site exceeds 950 MB! GitHub Pages limit is 1 GB."
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

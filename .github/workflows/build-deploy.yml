name: Build & Deploy Static Site

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode: full or recent'
        required: false
        default: 'recent'
        type: choice
        options:
          - full
          - recent
  schedule:
    # Full rebuild daily at 03:00 UTC (06:00 MSK)
    - cron: '0 3 * * *'
    # Hourly rebuild at minute 15 — downloads latest cached_posts.json and rebuilds
    - cron: '15 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine build mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            CRON_EXPR="${{ github.event.schedule }}"
            if [[ "$CRON_EXPR" == "0 3 * * *" ]]; then
              echo "mode=full" >> $GITHUB_OUTPUT
              echo "BUILD_MODE=full" >> $GITHUB_ENV
              echo "=== Daily full rebuild ==="
            else
              echo "mode=recent" >> $GITHUB_OUTPUT
              echo "BUILD_MODE=recent" >> $GITHUB_ENV
              echo "=== Hourly rebuild (fresh posts) ==="
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "BUILD_MODE=${{ inputs.mode }}" >> $GITHUB_ENV
            echo "=== Manual dispatch: ${{ inputs.mode }} build ==="
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "mode=recent" >> $GITHUB_OUTPUT
            echo "BUILD_MODE=recent" >> $GITHUB_ENV
            echo "=== Push-triggered recent build ==="
          else
            echo "mode=recent" >> $GITHUB_OUTPUT
            echo "BUILD_MODE=recent" >> $GITHUB_ENV
            echo "=== Default recent build ==="
          fi

      - name: Download cached posts
        run: |
          echo "=== Downloading latest cached_posts.json ==="
          mkdir -p data
          curl -sL "https://raw.githubusercontent.com/creastudioai-beep/sap/refs/heads/main/data/cached_posts.json" \
            -o data/cached_posts.json
          POST_COUNT=$(python3 -c "import json; data=json.load(open('data/cached_posts.json')); print(len(data))" 2>/dev/null || echo "0")
          echo "Downloaded cached_posts.json with ${POST_COUNT} posts"
          if [ "$POST_COUNT" -eq "0" ]; then
            echo "ERROR: Failed to download cached_posts.json or it's empty!"
            exit 1
          fi

      - name: Clean old build output
        run: |
          echo "=== Cleaning docs/ directory to remove stale pages ==="
          rm -rf docs/
          echo "docs/ cleaned"

      - name: Build static site
        run: python -m site_generator --output docs
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify build output
        run: |
          echo "=== Build Output Summary ==="
          echo "Build mode: $BUILD_MODE"
          echo ""
          echo "Total size of docs/:"
          du -sh docs/ 2>/dev/null || echo "docs/ not found"
          echo ""
          echo "File counts:"
          find docs/ -name "*.html" 2>/dev/null | wc -l | xargs -I{} echo "  HTML files: {}"
          find docs/ -name "*.css" 2>/dev/null | wc -l | xargs -I{} echo "  CSS files: {}"
          find docs/ -name "*.js" 2>/dev/null | wc -l | xargs -I{} echo "  JS files: {}"
          find docs/ -name "*.xml" 2>/dev/null | wc -l | xargs -I{} echo "  XML files: {}"
          find docs/ -name "*.json" 2>/dev/null | wc -l | xargs -I{} echo "  JSON files: {}"
          echo ""
          echo "Key files:"
          ls -la docs/index.html docs/style.css docs/i18n.js docs/scripts.js 2>/dev/null || true
          ls -la docs/shop/index.html docs/contacts/index.html docs/privacy/index.html 2>/dev/null || true
          echo ""
          echo "Shop pages count:"
          find docs/shop/ -name "index.html" 2>/dev/null | wc -l | xargs -I{} echo "  {} shop pages"
          echo ""
          echo "Post pages count:"
          find docs/post/ -name "*.html" 2>/dev/null | wc -l | xargs -I{} echo "  {} post pages"
          echo ""
          echo "Cached posts downloaded:"
          python3 -c "import json; d=json.load(open('data/cached_posts.json')); print(f'  {len(d)} posts')" 2>/dev/null || echo "  (cached_posts.json not found)"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push docs/
        run: |
          # Remove all tracked docs/ files first, then add new ones
          git rm -r --cached docs/ 2>/dev/null || true
          git add -f docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build ($BUILD_MODE): $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Check GitHub Pages size
        run: |
          SIZE_BYTES=$(du -sb docs/ | cut -f1)
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Total docs/ size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 950 ]; then
            echo "WARNING: docs/ exceeds 950 MB! GitHub Pages limit is 1 GB."
            echo "Consider reducing MAX_POSTS_TO_GENERATE in config.py"
          fi

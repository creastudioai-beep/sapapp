name: Build & Deploy Static Site

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode: full or recent'
        required: false
        default: 'recent'
        type: choice
        options:
          - full
          - recent
  schedule:
    # Full scrape daily at 03:00 UTC (06:00 MSK) — refreshes ALL posts & media links
    - cron: '0 3 * * *'
    # Recent scrape every hour at minute 15 — fetches latest 50 posts for news
    - cron: '15 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine build mode
        id: mode
        run: |
          # Default: determine from schedule trigger
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # Check if this is the daily cron (03:00 UTC) or hourly cron
            EVENT_HOUR=$(date -u -d "${{ github.event.schedule }}" +%H 2>/dev/null || echo "")
            # github.event.schedule gives the cron expression
            CRON_EXPR="${{ github.event.schedule }}"
            if [[ "$CRON_EXPR" == "0 3 * * *" ]]; then
              echo "mode=full" >> $GITHUB_OUTPUT
              echo "BUILD_MODE=full" >> $GITHUB_ENV
              echo "=== Daily full scrape build ==="
            else
              echo "mode=recent" >> $GITHUB_OUTPUT
              echo "BUILD_MODE=recent" >> $GITHUB_ENV
              echo "=== Hourly recent posts build ==="
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "BUILD_MODE=${{ inputs.mode }}" >> $GITHUB_ENV
            echo "=== Manual dispatch: ${{ inputs.mode }} build ==="
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "mode=recent" >> $GITHUB_OUTPUT
            echo "BUILD_MODE=recent" >> $GITHUB_ENV
            echo "=== Push-triggered recent build ==="
          else
            echo "mode=recent" >> $GITHUB_OUTPUT
            echo "BUILD_MODE=recent" >> $GITHUB_ENV
            echo "=== Default recent build ==="
          fi

      - name: Parse Telegram channel (full — daily)
        if: env.BUILD_MODE == 'full'
        run: |
          echo "=== Running Telegram parser: FULL scan (up to 15000 posts) ==="
          echo "This refreshes ALL posts including media links that may have expired"
          python -m site_generator.telegram_parser --full --limit 15000
        env:
          PYTHONUNBUFFERED: '1'
          PARSE_LIMIT: '15000'

      - name: Parse Telegram channel (recent — hourly)
        if: env.BUILD_MODE == 'recent'
        run: |
          echo "=== Running Telegram parser: RECENT scan (latest 50 posts) ==="
          echo "This fetches only the latest news posts and merges with existing data"
          python -m site_generator.telegram_parser --recent 50
        env:
          PYTHONUNBUFFERED: '1'
          RECENT_LIMIT: '50'

      - name: Clean old build output
        run: |
          echo "=== Cleaning docs/ directory to remove stale pages ==="
          rm -rf docs/
          echo "docs/ cleaned"

      - name: Build static site
        run: python -m site_generator --output docs
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify build output
        run: |
          echo "=== Build Output Summary ==="
          echo "Build mode: $BUILD_MODE"
          echo ""
          echo "Total size of docs/:"
          du -sh docs/ 2>/dev/null || echo "docs/ not found"
          echo ""
          echo "File counts:"
          find docs/ -name "*.html" 2>/dev/null | wc -l | xargs -I{} echo "  HTML files: {}"
          find docs/ -name "*.css" 2>/dev/null | wc -l | xargs -I{} echo "  CSS files: {}"
          find docs/ -name "*.js" 2>/dev/null | wc -l | xargs -I{} echo "  JS files: {}"
          find docs/ -name "*.xml" 2>/dev/null | wc -l | xargs -I{} echo "  XML files: {}"
          find docs/ -name "*.json" 2>/dev/null | wc -l | xargs -I{} echo "  JSON files: {}"
          echo ""
          echo "Key files:"
          ls -la docs/index.html docs/style.css docs/i18n.js docs/scripts.js 2>/dev/null || true
          ls -la docs/shop/index.html docs/contacts/index.html docs/privacy/index.html 2>/dev/null || true
          echo ""
          echo "Shop pages count:"
          find docs/shop/ -name "index.html" 2>/dev/null | wc -l | xargs -I{} echo "  {} shop pages"
          echo ""
          echo "Post pages count:"
          find docs/post/ -name "*.html" 2>/dev/null | wc -l | xargs -I{} echo "  {} post pages"
          echo ""
          echo "Telegram posts parsed:"
          cat data/telegram_posts/meta.json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'  {d.get(\"total_posts\",\"?\")} posts in {d.get(\"pages_count\",\"?\")} pages')" || echo "  (meta.json not found)"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push docs/
        run: |
          # Remove all tracked docs/ files first, then add new ones
          # This ensures stale product/post pages from previous builds are removed
          git rm -r --cached docs/ 2>/dev/null || true
          git add -f docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build ($BUILD_MODE): $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Check GitHub Pages size
        run: |
          SIZE_BYTES=$(du -sb docs/ | cut -f1)
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Total docs/ size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 950 ]; then
            echo "WARNING: docs/ exceeds 950 MB! GitHub Pages limit is 1 GB."
            echo "Consider reducing MAX_POSTS_TO_GENERATE in config.py"
          fi
